services:
  api:
    build: .
    environment:
      AROGYAFLOW_ENVIRONMENT: production
      AROGYAFLOW_DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      AROGYAFLOW_WAIT_MODEL_PATH: ${AROGYAFLOW_WAIT_MODEL_PATH:-models/wait_time/wait_time.joblib}
      AROGYAFLOW_ARRIVAL_MODEL_PATH: ${AROGYAFLOW_ARRIVAL_MODEL_PATH:-models/arrivals/arrival_forecast.joblib}
      AROGYAFLOW_NO_SHOW_MODEL_PATH: ${AROGYAFLOW_NO_SHOW_MODEL_PATH:-models/no_show/no_show.joblib}
      AROGYAFLOW_OCCUPANCY_MODEL_PATH: ${AROGYAFLOW_OCCUPANCY_MODEL_PATH:-models/occupancy/bed_occupancy.joblib}
      AROGYAFLOW_MONITORING_REPORT_PATH: ${AROGYAFLOW_MONITORING_REPORT_PATH:-reports/monitoring/latest.json}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
      - ./reports:/app/reports:ro

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dashboard:
    build: .
    command: streamlit run src/arogyaflow/dashboard.py --server.address 0.0.0.0
    environment:
      AROGYAFLOW_API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_started

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.14.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

volumes:
  postgres_data:
  mlflow_data:
